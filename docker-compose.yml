services:
  db:
    image: postgres:16-alpine
    container_name: client_infra_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: client_infra_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d client_infra_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: client_infra_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/client_infra_manager
      SECRET_KEY: change-this-to-a-long-random-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      API_V1_PREFIX: /api
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      AGENT_MODEL: llama3.2:3b
      AGENT_FALLBACK_MODELS: '["llama3.2:latest","mistral:latest"]'
      AGENT_TEMPERATURE: "0.1"
      AGENT_NUM_PREDICT: "1200"
      AGENT_TIMEOUT_SECONDS: "12"
      AGENT_MAX_SERVER_ATTEMPTS: "4"
      RUN_DB_MIGRATIONS: "true"
      RUN_DB_SEED: "true"
      DB_STARTUP_MAX_ATTEMPTS: "30"
      DB_STARTUP_SLEEP_SECONDS: "2"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: client_infra_frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
